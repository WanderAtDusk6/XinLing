<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>虚拟主播直播间场景</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #000;
        color: #f0f0f0;
        line-height: 1.6;
        overflow: hidden;
      }

      .container {
        width: 100vw;
        height: 100vh;
        position: relative;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 50px 50px;
      }

      .main-area {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 240px;
        bottom: 20px;
        background-color: rgba(17, 17, 17, 0.8);
        border: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .screen-area {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #screen-placeholder {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: rgba(17, 17, 17, 0.8);
        font-size: 32px;
        color: #666;
        text-align: center;
      }

      .select-window-btn {
        margin-top: 20px;
        padding: 12px 24px;
        background-color: #333;
        border: 1px solid #555;
        border-radius: 4px;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .select-window-btn:hover {
        background-color: #444;
        border-color: #777;
      }

      .screen-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        z-index: 10;
      }

      .right-panel {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 220px;
        bottom: 20px;
        background-color: rgba(17, 17, 17, 0.8);
        border: 1px solid #333;
      }

      .carousel {
        position: relative;
        width: 100%;
        height: 300px;
        overflow: hidden;
      }

      .carousel-container {
        display: flex;
        transition: transform 0.5s ease;
        height: 100%;
      }

      .carousel-item {
        flex: 0 0 100%;
        height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        text-align: left;
      }

      .carousel-item img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
      }

      .tech-blue {
        background: linear-gradient(
          135deg,
          rgba(10, 31, 37, 0.85) 0%,
          rgba(0, 0, 0, 0.6) 100%
        );
        border: 1px solid rgba(0, 240, 255, 0.3);
      }
      .tech-blue .tech-header h2 {
        color: #00f0ff;
        text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
      }
      .tech-blue .tech-line {
        background: linear-gradient(90deg, transparent, #00f0ff, transparent);
      }
      .tech-blue .tech-info p {
        color: #b0e5ff;
        text-shadow: 0 0 2px rgba(0, 240, 255, 0.3);
      }
      .tech-blue .tech-info em {
        color: #00f0ff;
        text-shadow: 0 0 3px rgba(0, 240, 255, 0.5);
        font-style: italic;
      }
      .tech-blue .status-content {
        color: #b0e5ff;
        font-weight: bold;
        text-shadow: 0 0 3px rgba(0, 240, 255, 0.3);
      }

      .tech-purple {
        background: linear-gradient(
          135deg,
          rgba(37, 10, 37, 0.85) 0%,
          rgba(0, 0, 0, 0.6) 100%
        );
        border: 1px solid rgba(200, 100, 255, 0.3);
      }
      .tech-purple .tech-header h2 {
        color: #c864ff;
        text-shadow: 0 0 5px rgba(200, 100, 255, 0.5);
      }
      .tech-purple .tech-line {
        background: linear-gradient(90deg, transparent, #c864ff, transparent);
      }
      .tech-purple .tech-info p {
        color: #e0c8ff;
        text-shadow: 0 0 2px rgba(200, 100, 255, 0.3);
      }

      .tech-green {
        background: linear-gradient(
          135deg,
          rgba(10, 37, 10, 0.85) 0%,
          rgba(0, 0, 0, 0.6) 100%
        );
        border: 1px solid rgba(0, 255, 136, 0.3);
      }
      .tech-green .tech-header h2 {
        color: #00ff88;
        text-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
      }
      .tech-green .tech-line {
        background: linear-gradient(90deg, transparent, #00ff88, transparent);
      }
      .tech-green .tech-info p {
        color: #c8ffe0;
        text-shadow: 0 0 2px rgba(0, 255, 136, 0.3);
        display: flex;
        align-items: center;
        margin: 6px 0;
      }

      .tech-red {
        background: linear-gradient(
          135deg,
          rgba(37, 10, 10, 0.85) 0%,
          rgba(0, 0, 0, 0.6) 100%
        );
        border: 1px solid rgba(255, 100, 100, 0.3);
      }
      .tech-red .tech-header h2 {
        color: #ff6464;
        text-shadow: 0 0 5px rgba(255, 100, 100, 0.5);
      }
      .tech-red .tech-line {
        background: linear-gradient(90deg, transparent, #ff6464, transparent);
      }
      .tech-red .tech-info p {
        color: #ffc8c8;
        text-shadow: 0 0 2px rgba(255, 100, 100, 0.3);
      }
      .tech-red .tech-info p:first-child {
        color: #ff6464;
        font-weight: bold;
      }

      .tech-content {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .tech-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .tech-header h2 {
        font-size: 16px;
        margin: 0;
      }

      .tech-body {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .tech-line {
        height: 1px;
        margin: 10px 0;
      }

      .tech-info {
        font-size: 12px;
        overflow: hidden;
        max-height: 180px;
      }

      .tech-info p {
        margin: 4px 0;
        line-height: 1.2;
      }

      .tech-info .checkbox {
        width: 16px;
        height: 16px;
        border: 1px solid #00ff88;
        border-radius: 3px;
        margin-right: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .tech-info .checkbox.checked {
        background-color: #00ff88;
      }

      .tech-info .checkbox.checked::after {
        content: "✓";
        color: #0a1f25;
        font-size: 12px;
        font-weight: bold;
      }

      .image-container {
        text-align: center;
        margin-bottom: 10px;
      }

      .image-container img {
        border: 1px solid rgba(255, 100, 100, 0.3);
        border-radius: 4px;
        box-shadow: 0 0 10px rgba(255, 100, 100, 0.3);
        max-width: 100%;
        max-height: 120px;
        object-fit: contain;
      }

      .carousel-dots {
        position: absolute;
        bottom: 10px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 8px;
      }

      .carousel-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: #666;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .carousel-dot.active {
        background-color: #fff;
      }

      .comment-area {
        position: relative;
        margin-top: 20px;
        height: calc(100% - 320px);
        padding: 10px;
      }

      .comment-header {
        height: 20px;
        margin-bottom: 10px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: flex-end;
      }

      .comment-header::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 50px;
        height: 1px;
        background: linear-gradient(90deg, transparent, #00f0ff, transparent);
        transform: translateY(-50%);
      }

      .terminal-content {
        position: absolute;
        top: 20px;
        left: 0;
        right: 0;
        bottom: 0;
        display: block;
        height: calc(100% - 30px);
        padding: 5px;
      }

      .control-buttons {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 10px;
        background-color: rgba(0, 0, 0, 0.5);
        border-top: 1px solid rgba(0, 240, 255, 0.3);
        gap: 8px;
      }

      .control-btn {
        padding: 2px 6px;
        background-color: transparent;
        border: 1px solid #00f0ff;
        color: #00f0ff;
        font-size: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .control-btn:hover {
        background-color: rgba(0, 240, 255, 0.1);
      }

      .corner-handle {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: #666;
        border: 1px solid #fff;
      }

      .top-left {
        top: -5px;
        left: -5px;
      }
      .top-right {
        top: -5px;
        right: -5px;
      }
      .bottom-left {
        bottom: -5px;
        left: -5px;
      }
      .bottom-right {
        bottom: -5px;
        right: -5px;
      }

      .status-online {
        color: #00ff88;
        text-shadow: 0 0 3px rgba(0, 255, 136, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <main-area></main-area>
      <right-panel></right-panel>
    </div>

    <script src="data/config.js"></script>
    <script src="data/carousel.js"></script>
    <script src="data/api.js"></script>
    <script>
      const { createApp, ref, onMounted, onUnmounted } = Vue;

      // 主区域组件
      const MainArea = {
        template: `
          <div class="main-area">
            <div class="corner-handle top-left"></div>
            <div class="corner-handle top-right"></div>
            <div class="corner-handle bottom-left"></div>
            <div class="corner-handle bottom-right"></div>

            <div class="screen-area">
              <div v-if="!isSharing" id="screen-placeholder">
                <p>屏幕投影区域</p>
                <p style="font-size: 14px; color: #888; margin-top: 10px">
                  用于投放游戏、PPT或其他内容
                </p>
                <button @click="shareScreen" class="select-window-btn">
                  {{ shareBtnText }}
                </button>
              </div>
              <video
                v-else
                ref="videoRef"
                class="screen-video"
                autoplay
                playsinline
              ></video>
            </div>
          </div>
        `,
        setup() {
          const isSharing = ref(false);
          const shareBtnText = ref("共享屏幕");
          const videoRef = ref(null);
          let mediaStream = null;

          const shareScreen = async () => {
            if (isSharing.value) {
              stopShare();
              return;
            }

            try {
              const screenConfig = window.appConfig.screenShare;
              mediaStream = await navigator.mediaDevices.getDisplayMedia({
                video: screenConfig.video,
                audio: screenConfig.audio,
              });
              videoRef.value.srcObject = mediaStream;
              isSharing.value = true;
              shareBtnText.value = "停止共享";

              mediaStream
                .getVideoTracks()[0]
                .addEventListener("ended", stopShare);
            } catch (error) {
              console.error("屏幕共享失败:", error);
              alert("屏幕共享失败: " + error.message);
            }
          };

          const stopShare = () => {
            if (mediaStream) {
              mediaStream.getTracks().forEach((track) => track.stop());
              mediaStream = null;
            }
            isSharing.value = false;
            shareBtnText.value = "共享屏幕";
          };

          return { isSharing, shareBtnText, videoRef, shareScreen };
        },
      };

      // 右侧面板组件
      const RightPanel = {
        template: `
          <div class="right-panel">
            <div class="corner-handle top-left"></div>
            <div class="corner-handle top-right"></div>
            <div class="corner-handle bottom-left"></div>
            <div class="corner-handle bottom-right"></div>

            <div class="carousel">
              <div
                class="carousel-container"
                :style="{ transform: 'translateX(-' + currentIndex * 100 + '%)' }"
              >
                <div
                  v-for="item in carouselItems"
                  :key="item.id"
                  :class="['carousel-item', 'tech-' + item.theme.split('-')[1]]"
                >
                  <div class="tech-content">
                    <div class="tech-header">
                      <h2>{{ item.title }}</h2>
                    </div>
                    <div class="tech-body">
                      <div class="tech-line"></div>
                      <div class="tech-info">
                        <div v-if="item.image" class="image-container">
                          <img :src="item.image" :alt="item.title" />
                        </div>
                        <template v-for="(content, idx) in item.content" :key="idx">
                          <p v-if="content.type === 'divider'">{{ content.content }}</p>
                          <p v-else-if="content.type === 'status'">
                            <span class="status-content">{{ content.content }}</span>
                          </p>
                          <p v-else-if="content.type === 'task'">
                            <span :class="['checkbox', content.checked && 'checked']"></span>
                            <span>{{ content.text }}</span>
                          </p>
                          <p v-else :class="content.class">
                            <em v-if="content.italic">{{ content.content }}</em>
                            <span v-else>{{ content.content }}</span>
                          </p>
                        </template>
                      </div>
                      <div class="tech-line"></div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="carousel-dots">
                <div
                  v-for="(_, idx) in carouselItems"
                  :key="idx"
                  :class="['carousel-dot', currentIndex === idx && 'active']"
                  @click="goToSlide(idx)"
                ></div>
              </div>
            </div>

            <div class="comment-area">
              <div class="comment-header"></div>

              <div class="terminal-content" id="terminal-content">
                <iframe
                  src="components/terminal.v0.0.1(XinLing).html"
                  style="width: 100%; height: 100%; border: none; background-color: transparent"
                ></iframe>
              </div>

              <div class="control-buttons">
                <button @click="toggleCarousel" class="control-btn">
                  {{ isPaused ? '[播放跑马灯]' : '[固定跑马灯]' }}
                </button>
                <button @click="toggleTerminal" class="control-btn">
                  {{ terminalVisible ? '[隐藏终端]' : '[显示终端]' }}
                </button>
              </div>
            </div>
          </div>
        `,
        setup() {
          const carouselItems = ref(window.carouselData || []);
          const currentIndex = ref(0);
          const isPaused = ref(false);
          const terminalVisible = ref(true);
          let autoSlideInterval = null;

          const carouselConfig = window.appConfig.carousel;

          const goToSlide = (index) => {
            currentIndex.value = index;
            if (!isPaused.value && autoSlideInterval) {
              clearInterval(autoSlideInterval);
              autoSlideInterval = setInterval(
                nextSlide,
                carouselConfig.interval,
              );
            }
          };

          const nextSlide = () => {
            if (!isPaused.value) {
              currentIndex.value =
                (currentIndex.value + 1) % carouselItems.value.length;
            }
          };

          const toggleCarousel = () => {
            isPaused.value = !isPaused.value;
          };

          const toggleTerminal = () => {
            terminalVisible.value = !terminalVisible.value;
            const terminalContent = document.getElementById("terminal-content");
            if (terminalContent) {
              terminalContent.style.display = terminalVisible.value
                ? "block"
                : "none";
            }
          };

          onMounted(() => {
            if (carouselConfig.autoPlay) {
              autoSlideInterval = setInterval(
                nextSlide,
                carouselConfig.interval,
              );
            }
          });

          onUnmounted(() => {
            if (autoSlideInterval) {
              clearInterval(autoSlideInterval);
            }
          });

          return {
            carouselItems,
            currentIndex,
            isPaused,
            terminalVisible,
            goToSlide,
            toggleCarousel,
            toggleTerminal,
          };
        },
      };

      // 创建并挂载应用
      const app = createApp({});
      app.component("MainArea", MainArea);
      app.component("RightPanel", RightPanel);
      app.mount("#app");
    </script>
  </body>
</html>
