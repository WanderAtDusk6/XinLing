<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        font-family: "Courier New", monospace;
      }
      .terminal {
        width: 250px;
        height: 150px;
        background: rgba(0, 0, 0, 0.7); /* 半透明黑底 */
        border: 1px solid #0f0; /* 绿色边框 */
        border-radius: 4px;
        padding: 10px;
        color: #0f0; /* 绿色文字 */
        font-size: 12px;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }
      .line {
        margin: 2px 0;
        white-space: nowrap;
        opacity: 0.8;
      }
      .cursor {
        display: inline-block;
        width: 6px;
        height: 12px;
        background: #0f0;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="terminal" id="term"></div>
    <script>
      const lines = [
        "> init virtual_host...",
        "> loading knowledge_base...",
        "> connecting to audience...",
        "> npm install coffee --save",
        "> compiling ideas...",
        "> warning: too much caffeine detected",
        "> git push origin live_stream",
        "> build success [2026-03-09]",
        "> waiting for input...",
      ];
      const term = document.getElementById("term");
      let i = 0;
      function addLine() {
        const div = document.createElement("div");
        div.className = "line";
        div.innerText = lines[i % lines.length];
        term.appendChild(div);
        if (term.children.length > 6) term.removeChild(term.firstChild);
        i++;
        setTimeout(addLine, 800 + Math.random() * 1000); // 随机速度
      }
      // 初始添加光标
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      term.appendChild(cursor);
      addLine();
    </script>
  </body>
</html>
