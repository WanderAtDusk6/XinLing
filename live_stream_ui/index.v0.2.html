<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟主播直播间场景</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #f0f0f0;
            line-height: 1.6;
            overflow: hidden;
        }
        
        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .date-time {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 14px;
            color: #fff;
            font-weight: 600;
        }
        
        .channel-info {
            position: absolute;
            top: 10px;
            left: 150px;
            font-size: 12px;
            color: #ccc;
        }
        
        .main-area {
            position: absolute;
            top: 80px;
            left: 80px;
            right: 250px;
            bottom: 120px;
            background-color: rgba(17, 17, 17, 0.8);
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-area {
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
        }
        
        .logo-subtitle {
            font-size: 18px;
            color: #888;
        }
        
        .comment-area {
            position: absolute;
            top: 80px;
            right: 80px;
            width: 170px;
            bottom: 120px;
            background-color: rgba(17, 17, 17, 0.8);
            border: 1px solid #333;
        }
        
        .comment-header {
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid #333;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        
        .comment-content {
            padding: 10px;
            height: calc(100% - 40px);
            overflow-y: auto;
        }
        
        .comment-item {
            margin-bottom: 10px;
            font-size: 12px;
            color: #ccc;
        }
        
        .bottom-section {
            position: absolute;
            bottom: 80px;
            left: 80px;
            right: 250px;
            height: 40px;
            background-color: rgba(17, 17, 17, 0.8);
            border: 1px solid #333;
        }
        
        .section-header {
            padding: 5px 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid #333;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }
        
        .section-content {
            padding: 5px 10px;
            font-size: 10px;
            color: #ccc;
        }
        
        .area-label {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            font-size: 12px;
            color: #fff;
            border: 1px solid #333;
        }
        
        .main-area-label {
            top: -30px;
            left: 0;
        }
        
        .comment-area-label {
            top: -30px;
            left: 0;
        }
        
        .bottom-section-label {
            top: -30px;
            left: 0;
        }
        
        .corner-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #666;
            border: 1px solid #fff;
        }
        
        .top-left {
            top: -5px;
            left: -5px;
        }
        
        .top-right {
            top: -5px;
            right: -5px;
        }
        
        .bottom-left {
            bottom: -5px;
            left: -5px;
        }
        
        .bottom-right {
            bottom: -5px;
            right: -5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 日期时间 -->
        <div class="date-time">DATE: 2026-03-09</div>
        
        <!-- 频道信息 -->
        <div class="channel-info">
            <div>频道: 虚拟主播</div>
            <div>平台: B站</div>
        </div>
        
        <!-- 主区域 -->
        <div class="main-area">
            <div class="area-label main-area-label">主播画面区域</div>
            <div class="corner-handle top-left"></div>
            <div class="corner-handle top-right"></div>
            <div class="corner-handle bottom-left"></div>
            <div class="corner-handle bottom-right"></div>
            
            <div class="logo-area">
                <div class="logo">VIRTUAL STUDIO</div>
                <div class="logo-subtitle">虚拟主播直播间</div>
            </div>
        </div>
        
        <!-- 评论区域 -->
        <div class="comment-area">
            <div class="area-label comment-area-label">弹幕区域</div>
            <div class="corner-handle top-left"></div>
            <div class="corner-handle top-right"></div>
            <div class="corner-handle bottom-left"></div>
            <div class="corner-handle bottom-right"></div>
            
            <div class="comment-header">COMMENT</div>
            <div class="comment-content">
                <div class="comment-item">观众1: 主播好厉害！</div>
                <div class="comment-item">观众2: 这个技术点我一直没搞懂</div>
                <div class="comment-item">观众3: 求教程链接</div>
                <div class="comment-item">观众4: 主播声音好好听</div>
                <div class="comment-item">观众5: 期待下一期内容</div>
            </div>
        </div>
        
        <!-- 底部区域 -->
        <div class="bottom-section">
            <div class="area-label bottom-section-label">信息展示区域</div>
            <div class="corner-handle top-left"></div>
            <div class="corner-handle top-right"></div>
            <div class="corner-handle bottom-left"></div>
            <div class="corner-handle bottom-right"></div>
            
            <div class="section-header">SECTION</div>
            <div class="section-content">
                直播标题: 今晚聊点技术 | 虚拟主播的日常
            </div>
        </div>
    </div>
</body>
</html>
